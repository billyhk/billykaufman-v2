    <style>
      html,
      body {
        width: 100%;
        height: 100%;
      }

      html,
      body,
      h1,
      h2,
      h3 {
        margin: 0;
      }

      .page-size {
        width: 728px;
        height: 90px;
      }

      .page-container {
        overflow: hidden;
        background-color: #000;
        position: relative;
        font-family: Montserrat;
      }

      .radial-gradient {
        background-image: -webkit-radial-gradient(
          rgb(0, 210, 179) 0%,
          rgba(0, 0, 0, 0) 24%
        );
        height: 525px;
        width: 642.585px;
        position: absolute;
        left: -300px;
        top: -275px;
        transform: matrix(1.13, 0, 0, 1, 0, 0);
        transform-style: preserve-3d;
      }

      .radial-gradient-2 {
        background-image: -webkit-radial-gradient(
          rgba(0, 210, 179, 0.6) 0%,
          rgba(0, 0, 0, 0) 50%
        );

        height: 200px;
        width: 500px;
        position: absolute;
        left: 60%;
        bottom: -40%;
        transform: matrix(1.3, 0, 0, 2.3, 0, 0);
        transform-origin: 50% 50%;
        transform-style: preserve-3d;
      }

      .lines-svg-size3 {
        z-index: 0;
        opacity: 1;
        height: 500px;
        width: 1400px;
        position: absolute;
        left: 20px;
        bottom: -500px;
      }

      .side-content {
        display: flex;
        flex-direction: column;
        position: absolute;
        right: 1rem;
        top: 1.25rem;
      }

      .page-content {
        display: flex;
        position: absolute;
        flex-direction: column;
        row-gap: 0.35rem;
        padding: 1rem;
      }

      .page-content > h1,
      .fadein-fadeout-copy > h2,
      button {
        opacity: 0;
      }

      .fadein-fadeout-copy {
        position: relative;
      }

      .fadein-fadeout-copy .subheading-animation-copyB {
        position: absolute;
        top: 0;
      }
      .page-content > h1 {
        color: #fff;
        font-weight: 700;
        font-size: 1.5rem;
      }
      .fadein-fadeout-copy > h2 {
        color: #00d2b3;
        font-weight: 500;
        font-size: 1.1rem;
      }

      .side-content > button {
        width: 9rem;
        background-color: #00d2b3;
        border: 0;
        width: 8rem;
        font-size: 0.65rem;
        padding: 0.5rem 0;
        cursor: pointer;
      }

      .company-name {
        font-size: 1.4rem;
        color: #fff;
        font-weight: 600;

        display: none;
        opacity: 0.5;

        position: absolute;
        top: 2rem;
      }

      .company-name-logo {
        width: 7.9rem;
        position: absolute;
        right: 0rem;
        bottom: -1.8rem;
      }

      /* ANIMATIONS */
      .heading-animation {
        animation: 1s linear 0.4s 1 normal forwards running
          heading-animation_keyframes;
      }
      @keyframes heading-animation_keyframes {
        0% {
          opacity: 0;
          transform: translate3d(0px, 7px, 0px);
          animation-timing-function: ease-in;
        }
        100% {
          opacity: 1;
          transform: translate3d(0px, -3px, 0px);
          animation-timing-function: linear;
        }
      }
      .subheading-animation-copyA {
        animation: 6s linear 1.7s 1 normal forwards running
          subheading-copyA-animation_keyframes;
      }
      @keyframes subheading-copyA-animation_keyframes {
        0% {
          transform: translate3d(0px, 7px, 0px);
          opacity: 0;
          animation-timing-function: ease-in;
        }
        25% {
          transform: translate3d(0px, -3px, 0px);
          opacity: 1;
          animation-timing-function: linear;
        }
        50% {
          transform: translate3d(0px, -3px, 0px);
          opacity: 1;
          animation-timing-function: linear;
        }
        75% {
          transform: translate3d(0px, 7px, 0px);
          opacity: 0;
          animation-timing-function: ease-out;
        }
      }
      .subheading-animation-copyB {
        animation: 1.5s linear 5.9s 1 normal forwards running
          subheading-animation_keyframes;
      }
      @keyframes subheading-animation_keyframes {
        0% {
          transform: translate3d(0px, 7px, 0px);
          opacity: 0;
          animation-timing-function: ease-in;
        }
        100% {
          transform: translate3d(0px, -3px, 0px);
          opacity: 1;
          animation-timing-function: linear;
        }
      }
      .button-animations {
        animation: 1s linear 7.8s 1 normal forwards running
          button-animation_keyframes;
      }
      @keyframes button-animation_keyframes {
        0% {
          opacity: 0;
          transform: translate3d(2px, 0px, 0px);
          animation-timing-function: ease-in;
        }
        100% {
          opacity: 1;
          transform: translate3d(2px, -5px, 0px);
          animation-timing-function: linear;
        }
      }
      .lines-svg-animation {
        animation: 13.4s linear 0s 3 normal forwards running
          lines-svg-animation_keyframes;
      }
      @keyframes lines-svg-animation_keyframes {
        0% {
          transform: translate3d(110px, -275px, 100px) rotateZ(-35deg)
            scale3d(1, 1, 0.001);
          animation-timing-function: ease-in-out;
        }
        50% {
          transform: translate3d(180px, -275px, 100px) rotateZ(-35deg)
            scale3d(1.73, 1.83, -0.149);
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: translate3d(110px, -275px, 100px) rotateZ(-35deg)
            scale3d(1, 1, 0.001);
          animation-timing-function: linear;
        }
      }

      .radial-gradient-animation {
        animation: 13.4s linear 0s 3 normal forwards running
          radial-gradient_keyframes;
      }
      @keyframes radial-gradient_keyframes {
        0% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        29.8507% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        52.2388% {
          transform: scale3d(2.45, 1.49, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        61.194% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: linear;
        }
      }
      .radial-gradient-animation-2 {
        animation: 13.4s linear 0s 3 normal forwards running
          radial-gradient_keyframes-2;
      }
      @keyframes radial-gradient_keyframes-2 {
        0% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        29.8507% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        52.2388% {
          transform: scale3d(2.45, 1.49, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        61.194% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: linear;
        }
      }
