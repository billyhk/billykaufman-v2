    <title>Bloomberg Banner 320x100</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
      }

      html,
      body,
      h1,
      h3,
      button {
        margin: 0;
      }

      .page-size {
        width: 320px;
        height: 100px;
      }

      .page-container {
        overflow: hidden;
        background-color: #000;
        position: relative;
        font-family: Montserrat;
      }

      .radial-gradient {
        background-image: -webkit-radial-gradient(
          rgb(0, 210, 179) 0%,
          rgba(0, 0, 0, 0) 24%
        );
        height: 450px;
        width: 600px;
        position: absolute;
        left: -300px;
        top: -275px;
        transform: matrix(1.13, 0, 0, 1, 0, 0);
        transform-style: preserve-3d;
      }

      .radial-gradient-2 {
        background-image: -webkit-radial-gradient(
          rgba(0, 210, 179, 0.6) 0%,
          rgba(0, 0, 0, 0) 50%
        );

        height: 200px;
        width: 500px;
        position: absolute;
        left: 60%;
        bottom: -40%;
        transform: matrix(1.3, 0, 0, 2.3, 0, 0);
        transform-origin: 50% 50%;
        transform-style: preserve-3d;
      }

      .page-content {
        z-index: 1;
        position: absolute;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        padding: 0.75rem;
      }

      .page-content > h1 {
        color: #fff;
        font-weight: 600;
        font-size: 1.05rem;
        opacity: 0;
      }

      .button {
        width: 5.5rem;
        background-color: #00d2b3;
        border: 0;
        padding: 0.25rem;
        cursor: pointer;
        font-size: 0.5rem;
        opacity: 0;
      }

      .company-name {
        font-size: 0.75rem;
        color: #fff;
        font-weight: 600;
        position: absolute;
        right: -5.5rem;
        top: 2.5rem;
        transform: rotate(90deg);
        opacity: 0.5;
      }
      .company-name-logo {
        width: 4.2rem;

        transform: rotate(90deg);
        position: absolute;
        right: -5.3rem;
        top: 2.55rem;
      }


      .lines-svg-size3 {
        z-index: 0;
        opacity: 0.5;
        height: 350px;
        width: 550px;
        position: absolute;
        left: -5px;
        bottom: -450px;
      }

      /* ANIMATIONS */
      .heading-animation {
        animation: 1s linear 0.4s 1 normal forwards running
          heading-animation_keyframes;
      }
      @keyframes heading-animation_keyframes {
        0% {
          opacity: 0;
          transform: translate3d(0px, 10px, 0px);
          animation-timing-function: ease-in;
        }
        100% {
          opacity: 1;
          transform: translate3d(0px, 0px, 0px);
          animation-timing-function: linear;
        }
      }
      .subheading-animation {
        animation: 1s linear 1.7s 1 normal forwards running
          subheading-animation_keyframes;
      }
      @keyframes subheading-animation_keyframes {
        0% {
          transform: translate3d(0px, 7px, 0px);
          opacity: 0;
          animation-timing-function: ease-in;
        }
        100% {
          transform: translate3d(0px, -3px, 0px);
          opacity: 1;
          animation-timing-function: linear;
        }
      }
      .button-animations {
        animation: 2s linear 1.7s 1 normal forwards running
          button-animation_keyframes;
      }
      @keyframes button-animation_keyframes {
        0% {
          opacity: 0;
          transform: translate3d(12px, 74px, 0px);
          animation-timing-function: ease-in;
        }
        100% {
          opacity: 1;
          transform: translate3d(12px, 62px, 0px);
          animation-timing-function: linear;
        }
      }
      .lines-svg-animation {
        animation: 13.4s linear 0s 3 normal forwards running
          lines-svg-animation_keyframes;
      }
      @keyframes lines-svg-animation_keyframes {
        0% {
          transform: translate3d(4px, -226px, 0px) rotateZ(-80deg)
            scale3d(1, 1, 0.501);
          animation-timing-function: ease-in-out;
        }
        50% {
          transform: translate3d(10px, -226px, 0px) rotateZ(-70deg)
            scale3d(0.73, 1.5, 0.49);
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: translate3d(4px, -226px, 0px) rotateZ(-80deg)
            scale3d(1, 1, 0.001);
          animation-timing-function: linear;
        }
      }
      .radial-gradient-animation {
        animation: 13.4s linear 0s 3 normal forwards running
          radial-gradient_keyframes;
      }
      @keyframes radial-gradient_keyframes {
        0% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        29.8507% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        52.2388% {
          transform: scale3d(2.45, 1.49, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        61.194% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: linear;
        }
      }
      .radial-gradient-animation-2 {
        animation: 13.4s linear 0s 3 normal forwards running
          radial-gradient_keyframes-2;
      }
      @keyframes radial-gradient_keyframes-2 {
        0% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        29.8507% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        52.2388% {
          transform: scale3d(2.45, 1.49, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: ease-in-out;
        }
        61.194% {
          border-color: transparent;
          animation-timing-function: ease-in-out;
        }
        100% {
          transform: scale3d(1.13, 1, 1);
          border-color: rgb(0, 0, 0);
          animation-timing-function: linear;
        }
      }
    </style>
